<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>{{ title }}</title>
    <style>
      {% include "style.css" without context %}
    </style>
  </head>
  <body>
    <main>
      <h1>{{title}}</h1>
      <p class="links">
        <a href="{{link}}">{{publisher}}</a>
      </p>
      <ul class="authors">
        {% for auth in author %}
        <li>{{auth.given}} {{auth.family}}</li>
        {% endfor %}
      </ul>
      <p class="abstract">{{abstract}}</p>
    </main>
  </body>
</html>
